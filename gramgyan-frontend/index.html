<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GramGyan — Gatekeeper Portal Entry</title>
  <meta name="description" content="Entry portal for Students, Teachers, NGO Operations, and B2B Company Partners.">
  <link rel="stylesheet" href="style.css">
  <style>
    .login-container {
      max-width: 600px;
      margin: 80px auto;
      padding: 0 20px;
      text-align: center;
    }
    .role-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin: 32px 0;
    }
    .role-btn {
      background: var(--bg-card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 16px;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .role-btn:hover {
      border-color: var(--border-strong);
      transform: translateY(-2px);
    }
    .role-btn.selected-s { border-color: var(--accent-student); background: rgba(34,211,238,0.06); box-shadow: var(--shadow-glow-cyan); }
    .role-btn.selected-t { border-color: var(--accent-teacher); background: rgba(167,139,250,0.06); box-shadow: var(--shadow-glow-violet); }
    .role-btn.selected-c { border-color: var(--accent-company); background: rgba(251,146,60,0.06); box-shadow: var(--shadow-glow-orange); }
    .role-btn.selected-n { border-color: var(--accent-ngo); background: rgba(74,222,128,0.06); box-shadow: var(--shadow-glow-green); }
    .role-icon { font-size: 2.2rem; }
    .role-title { font-weight: 800; font-size: 1.1rem; color: var(--text-primary); }
    .role-desc { font-size: 0.78rem; color: var(--text-secondary); line-height: 1.4; }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="topnav" style="justify-content: center;">
    <div class="nav-logo">
      <div class="nav-orb"></div>
      GramGyan — ग्रामज्ञान
    </div>
  </nav>

  <div class="login-container">
    <div class="badge badge-cyan" style="display:inline-flex;margin-bottom:20px;">GramGyan Gatekeeper Entry</div>
    <h1 style="font-size: 2.2rem; font-weight: 900; line-height: 1.2;">
      Choose Your Portal<br>
      <span style="background: linear-gradient(90deg, var(--accent-student), var(--accent-teacher)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">To Access GramGyan</span>
    </h1>
    <p style="color:var(--text-secondary); margin-top:10px; font-size:0.95rem;">Select your operational role below to enter the secure offline-first network hub.</p>

    <!-- Role selection grid -->
    <div class="role-grid">
      <button class="role-btn" id="btn-student" onclick="selectRole('student')">
        <span class="role-icon">🎒</span>
        <span class="role-title">I am a Student</span>
        <span class="role-desc">Study with AI Mentor, solve code challenges, and view skills profile.</span>
      </button>

      <button class="role-btn" id="btn-teacher" onclick="selectRole('teacher')">
        <span class="role-icon">👩‍🏫</span>
        <span class="role-title">I am a Teacher</span>
        <span class="role-desc">Verify student progress, generate localized lesson plans, and resolve doubts.</span>
      </button>

      <button class="role-btn" id="btn-company" onclick="selectRole('company')">
        <span class="role-icon">🏢</span>
        <span class="role-title">I am a Company</span>
        <span class="role-desc">Recruit pre-screened talent, publish project challenges, and verify HMAC hashes.</span>
      </button>

      <button class="role-btn" id="btn-ngo" onclick="selectRole('ngo')">
        <span class="role-icon">🤝</span>
        <span class="role-title">I am an NGO Partner</span>
        <span class="role-desc">Monitor solar village hubs, manage study tablets, and distribute grace cushions.</span>
      </button>
    </div>

    <!-- Login form fields -->
    <div class="card" style="padding:20px; display:flex; flex-direction:column; gap:14px; text-align:left;">
      <div class="form-group">
        <label>Selected Role</label>
        <input class="form-input" id="selected-role-display" readonly value="Please select a role above..." style="color:var(--text-muted); font-weight:700;">
      </div>
      <button class="btn btn-ghost w-full" id="login-submit" disabled onclick="enterPortal()">
        Enter Secure Portal →
      </button>
    </div>
  </div>

  <!-- FOOTER -->
  <footer style="margin-top:80px;border-top:1px solid var(--border);padding:24px 40px;display:flex;justify-content:space-between;align-items:center;font-size:0.8rem;color:var(--text-muted);">
    <span>© 2026 GramGyan — ग्रामज्ञान</span>
    <span>Multi-Role Gatekeeper Network · v1.2.0</span>
  </footer>

  <script>
    let selectedRole = null;

    function selectRole(role) {
      selectedRole = role;

      // Clear selections
      document.querySelectorAll('.role-btn').forEach(btn => {
        btn.className = 'role-btn';
      });

      // Highlight selected
      const displayInput = document.getElementById('selected-role-display');
      const submitBtn = document.getElementById('login-submit');

      if (role === 'student') {
        document.getElementById('btn-student').classList.add('selected-s');
        displayInput.value = 'STUDENT PORTAL ACCESS';
        displayInput.style.color = 'var(--accent-student)';
        submitBtn.className = 'btn btn-cyan w-full';
      } else if (role === 'teacher') {
        document.getElementById('btn-teacher').classList.add('selected-t');
        displayInput.value = 'TEACHER HUB ACCESS';
        displayInput.style.color = 'var(--accent-teacher)';
        submitBtn.className = 'btn btn-violet w-full';
      } else if (role === 'company') {
        document.getElementById('btn-company').classList.add('selected-c');
        displayInput.value = 'COMPANY PARTNER ACCESS';
        displayInput.style.color = 'var(--accent-company)';
        submitBtn.className = 'btn btn-orange w-full';
      } else if (role === 'ngo') {
        document.getElementById('btn-ngo').classList.add('selected-n');
        displayInput.value = 'NGO OPERATIONS CONTROL';
        displayInput.style.color = 'var(--accent-ngo)';
        submitBtn.className = 'btn btn-green w-full';
      }

      submitBtn.disabled = false;
    }

    function enterPortal() {
      if (!selectedRole) return;
      window.location.href = selectedRole + '.html';
    }
  </script>

</body>
</html>
